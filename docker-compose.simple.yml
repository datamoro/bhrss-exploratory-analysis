version: '3.8'

services:
  # PostgreSQL Database
  health_postgres:
    image: postgres:15-alpine
    container_name: health_postgres_simple
    hostname: health_postgres
    environment:
      POSTGRES_DB: health_data
      POSTGRES_USER: dataengineer
      POSTGRES_PASSWORD: SecurePass123!
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5434:5432"
    volumes:
      - health_postgres_data_simple:/var/lib/postgresql/data
    networks:
      health_net:
        aliases:
          - health_postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataengineer"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # Apache Superset (imagem oficial, sem build)
  health_superset:
    image: apache/superset:3.1.0
    container_name: health_superset_simple
    hostname: health_superset
    environment:
      - SUPERSET_SECRET_KEY=my_super_secret_key
      - SUPERSET_LOAD_EXAMPLES=no
    ports:
      - "8089:8088"
    volumes:
      - health_superset_data_simple:/app/superset_home
    networks:
      health_net:
        aliases:
          - health_superset
    depends_on:
      health_postgres:
        condition: service_healthy
    command: >
      sh -c "
      pip install psycopg2-binary &&
      superset db upgrade &&
      superset fab create-admin \
        --username admin \
        --firstname Admin \
        --lastname User \
        --email admin@health.com \
        --password admin || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088 --with-threads
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  health_postgres_data_simple:
    name: health_postgres_simple
    driver: local
  health_superset_data_simple:
    name: health_superset_simple
    driver: local

networks:
  health_net:
    name: health_network_simple
    driver: bridge